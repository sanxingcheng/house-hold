server:
  port: 8082

spring:
  application:
    name: house-hold-wealth
  config:
    import: optional:nacos:${spring.application.name}.yaml
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere.yaml
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  data:
    redis:
      host: 172.22.83.202
      port: 30379
  kafka:
    bootstrap-servers: 172.22.83.202:30092
    consumer:
      group-id: house-hold-wealth
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false        # 新增：忽略 __TypeId__ 等类型头
        spring.json.value.default.type: java.util.Map # 新增：默认按 Map 反序列化
  cloud:
    nacos:
      discovery:
        server-addr: 172.22.83.202:30848
        namespace: public
      config:
        server-addr: 172.22.83.202:30848
        namespace: public
        file-extension: yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

cache:
  enabled: true
  local:
    max-size: 1000
    ttl-seconds: 60
  ttl:
    redis-account-seconds: 300
    redis-summary-seconds: 60
    redis-snapshot-seconds: 600
    redis-random-max: 60
    null-placeholder-seconds: 120
  key-prefix: "household:wealth:"

snapshot:
  scheduler:
    enabled: true
    cron: "0 0 2 * * ?"
