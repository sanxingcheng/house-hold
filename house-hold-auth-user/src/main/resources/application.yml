server:
  port: 8081

spring:
  application:
    name: house-hold-auth-user
  config:
    import: optional:nacos:${spring.application.name}.yaml
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/household_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: Admin@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  data:
    redis:
      host: 172.22.83.202
      port: 30379
  kafka:
    bootstrap-servers: 172.22.83.202:30092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: "1"
  cloud:
    nacos:
      discovery:
        server-addr: 172.22.83.202:30848
        namespace: public
      config:
        server-addr: 172.22.83.202:30848
        namespace: public
        file-extension: yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  jwt:
    secret: house-hold-jwt-secret-key-change-in-production-min-256-bits
    expiration-ms: 86400000

# 迭代二：缓存（可选，不配 Redis 则仅用 Caffeine）
cache:
  enabled: true
  local:
    max-size: 1000
    ttl-seconds: 300
  ttl:
    redis-user-seconds: 1800
    redis-family-seconds: 1800
    redis-random-max: 300
    null-placeholder-seconds: 120
  key-prefix: "household:auth:"
