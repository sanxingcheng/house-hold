server:
  port: 8081

spring:
  application:
    name: house-hold-auth-user
  config:
    import: optional:nacos:${spring.application.name}.yaml
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/household?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: Admin@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
      config:
        server-addr: localhost:8848
        namespace: public
        file-extension: yaml

management:
  endpoints:
    web:
      exposure:
        include: '*'

app:
  jwt:
    secret: house-hold-jwt-secret-key-change-in-production-min-256-bits
    expiration-ms: 86400000

# 迭代二：缓存（可选，不配 Redis 则仅用 Caffeine）
cache:
  enabled: true
  local:
    max-size: 1000
    ttl-seconds: 300
  ttl:
    redis-user-seconds: 1800
    redis-family-seconds: 1800
    redis-random-max: 300
    null-placeholder-seconds: 120
  key-prefix: "household:auth:"
