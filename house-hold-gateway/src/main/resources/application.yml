server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  jwt:
    secret: house-hold-jwt-secret-key-change-in-production-min-256-bits

spring:
  application:
    name: house-hold-gateway
  config:
    import: optional:nacos:${spring.application.name}.yaml
  data:
    redis:
      host: 172.22.83.202
      port: 30379
  cloud:
    nacos:
      discovery:
        server-addr: 172.22.83.202:30848
        namespace: public
      config:
        server-addr: 172.22.83.202:30848
        namespace: public
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-user-auth
          uri: lb://house-hold-auth-user
          predicates:
            - Path=/auth/**
        - id: auth-user-user
          uri: lb://house-hold-auth-user
          predicates:
            - Path=/user/**
        - id: auth-user-family
          uri: lb://house-hold-auth-user
          predicates:
            - Path=/family/**
        - id: wealth
          uri: lb://house-hold-wealth
          predicates:
            - Path=/wealth/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
