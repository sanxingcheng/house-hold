# Production configuration for monolithic JAR deployment
# No Redis required - session management is JWT-only

server:
  port: 8080

spring:
  application:
    name: house-hold-single

  # Both datasources point to household_single (existing data from old monolithic version)
  datasource:
    auth:
      url: jdbc:mysql://127.0.0.1:3306/household_single?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: root
      password: Admin@123
      driver-class-name: com.mysql.cj.jdbc.Driver
    wealth:
      url: jdbc:mysql://127.0.0.1:3306/household_single?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: root
      password: Admin@123
      driver-class-name: com.mysql.cj.jdbc.Driver

  # Disable Redis auto-configuration (no-op RedissonClient provided)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - com.alibaba.cloud.nacos.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryClientAutoConfiguration

app:
  jwt:
    secret: house-hold-jwt-secret-key-change-in-production-min-256-bits
    expiration-ms: 86400000

cache:
  enabled: true
  local:
    max-size: 1000
    ttl-seconds: 300

snapshot:
  scheduler:
    enabled: true
    cron: "0 0 2 * * ?"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
