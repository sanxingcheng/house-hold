apiVersion: apps/v1
kind: Deployment
metadata:
  name: house-hold-web
  namespace: house-hold
  labels:
    app: house-hold-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: house-hold-web
  template:
    metadata:
      labels:
        app: house-hold-web
    spec:
      containers:
        - name: web
          image: house-hold-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: house-hold-web
  namespace: house-hold
spec:
  selector:
    app: house-hold-web
  ports:
    - port: 80
      targetPort: 80
      name: http
