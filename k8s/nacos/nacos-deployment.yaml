# Nacos 单机模式部署 - 使用内置数据库（Derby），不依赖 MySQL，数据通过 PVC 持久化
# 覆盖 jdbc.properties，设置 db.num=0 避免加载外部数据源，否则会报 load jdbc.properties error
apiVersion: v1
kind: ConfigMap
metadata:
  name: nacos-embedded-db-conf
  labels:
    app: nacos
data:
  jdbc.properties: |
    db.num=0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nacos-data
  labels:
    app: nacos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  labels:
    app: nacos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: docker.m.daocloud.io/nacos/nacos-server:v2.3.0
          ports:
            - containerPort: 8848   # HTTP
            - containerPort: 9848   # gRPC
            - containerPort: 9849   # gRPC raft
          volumeMounts:
            # 内置库与日志等落盘于此，Pod 重启/重建后数据保留
            - name: data
              mountPath: /home/nacos/data
            # 覆盖 conf/jdbc.properties，db.num=0 表示不使用外部数据源
            - name: conf
              mountPath: /home/nacos/conf/jdbc.properties
              subPath: jdbc.properties
          env:
            - name: MODE
              value: "standalone"
            - name: PREFER_HOST_MODE
              value: "hostname"
            # 使用内置数据库（Derby），不连 MySQL
            - name: SPRING_DATASOURCE_PLATFORM
              value: ""
            # 镜像 application.properties 中默认 db.num=${MYSQL_DATABASE_NUM:1}，必须设为 0 才能彻底禁用外部数据源
            - name: MYSQL_DATABASE_NUM
              value: "0"
            # 兜底：防止镜像里残留的 ${MYSQL_SERVICE_*} 占位符报 UnknownHostException
            - name: MYSQL_SERVICE_HOST
              value: ""
            - name: MYSQL_SERVICE_PORT
              value: "3306"
            - name: MYSQL_SERVICE_DB_NAME
              value: ""
            - name: MYSQL_SERVICE_USER
              value: ""
            - name: MYSQL_SERVICE_PASSWORD
              value: ""
            # 开发环境关闭鉴权（生产建议改为 true 并配置 identity key/value、JWT secret）
            - name: NACOS_AUTH_ENABLE
              value: "false"
            - name: JVM_XMS
              value: "256m"
            - name: JVM_XMX
              value: "256m"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /nacos/v1/console/health/readiness
              port: 8848
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /nacos/v1/console/health/readiness
              port: 8848
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /nacos/v1/console/health/readiness
              port: 8848
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nacos-data
        - name: conf
          configMap:
            name: nacos-embedded-db-conf
---
# Nacos HTTP 与 gRPC 对外暴露
# 容器外访问：<节点IP>:30848 (控制台/HTTP)、<节点IP>:31848 (gRPC 客户端)
# gRPC NodePort 必须 = HTTP NodePort + 1000，因为 Nacos 2.x SDK 按此规则自动推导 gRPC 端口
apiVersion: v1
kind: Service
metadata:
  name: nacos
  labels:
    app: nacos
spec:
  type: NodePort
  selector:
    app: nacos
  ports:
    - name: http
      port: 8848
      targetPort: 8848
      nodePort: 30848
    - name: grpc
      port: 9848
      targetPort: 9848
      nodePort: 31848
