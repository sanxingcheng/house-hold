apiVersion: apps/v1
kind: Deployment
metadata:
  name: house-hold-wealth
  namespace: house-hold
  labels:
    app: house-hold-wealth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: house-hold-wealth
  template:
    metadata:
      labels:
        app: house-hold-wealth
    spec:
      containers:
        - name: wealth
          image: house-hold-wealth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: house-hold-config
                  key: NACOS_SERVER
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: house-hold-config
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: house-hold-config
                  key: REDIS_PORT
            # wealth 使用 ShardingSphere，需在 application 或 Nacos 中配置 datasource；此处仅示例覆盖单数据源场景
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "org.apache.shardingsphere.driver.ShardingSphereDriver"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:shardingsphere:classpath:shardingsphere.yaml"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: house-hold-wealth
  namespace: house-hold
spec:
  selector:
    app: house-hold-wealth
  ports:
    - port: 8082
      targetPort: 8082
      name: http
