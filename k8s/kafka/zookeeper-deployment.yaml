# Zookeeper 单机 - 供 Kafka 使用（使用官方 Apache 镜像），数据持久化
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zookeeper-data
  labels:
    app: zookeeper
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  labels:
    app: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: docker.m.daocloud.io/library/zookeeper:3.9
          ports:
            - containerPort: 2181
          volumeMounts:
            - name: data
              mountPath: /data
          env:
            - name: ZOO_MY_ID
              value: "1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zookeeper-data
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  labels:
    app: zookeeper
spec:
  type: NodePort
  selector:
    app: zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: 2181
      nodePort: 32181
