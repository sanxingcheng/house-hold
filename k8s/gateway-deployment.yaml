apiVersion: apps/v1
kind: Deployment
metadata:
  name: house-hold-gateway
  namespace: house-hold
  labels:
    app: house-hold-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: house-hold-gateway
  template:
    metadata:
      labels:
        app: house-hold-gateway
    spec:
      containers:
        - name: gateway
          image: house-hold-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: house-hold-config
                  key: NACOS_SERVER
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: house-hold-config
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: house-hold-config
                  key: REDIS_PORT
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: house-hold-gateway
  namespace: house-hold
spec:
  selector:
    app: house-hold-gateway
  ports:
    - port: 8080
      targetPort: 8080
      name: http
